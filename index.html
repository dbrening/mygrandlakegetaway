<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Rental Name</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Reset & Base Styles */
    * { box-sizing: border-box; margin:0; padding:0; font-family: 'Roboto', sans-serif; }
    body { line-height: 1.6; color: #333; }

    /* Header */
    header {
      background: #1e3d59;
      color: white;
      padding: 2rem 1rem;
      text-align: center;
    }
    header h1 { margin-bottom: 0.5rem; }
    header p { font-size: 1.1rem; }

    /* Navigation */
    nav { margin-top: 1rem; }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 1rem;
      font-weight: bold;
    }
    nav a:hover { text-decoration: underline; }

    /* Hero Section */
    .hero {
      background: url('images/hero.jpg') center/cover no-repeat;
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    .hero h2 { font-size: 2.5rem; text-align: center; }

    /* Main Content */
    main { padding: 2rem 1rem; max-width: 1200px; margin: auto; }

    /* Sections */
    section { margin-bottom: 3rem; }
    h2 { margin-bottom: 1rem; color: #1e3d59; }

    /* Gallery */
    .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }
    .gallery img { width: 100%; border-radius: 8px; }

    /* Amenities */
    .amenities { display: flex; flex-wrap: wrap; gap: 1rem; }
    .amenity { background: #f0f0f0; padding: 1rem; border-radius: 8px; flex: 1 1 200px; }

    /* Contact Form */
    form { display: flex; flex-direction: column; gap: 1rem; max-width: 600px; margin: auto; }
    input, textarea { padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; width: 100%; }
    button { background: #1e3d59; color: white; border: none; padding: 1rem; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #16334a; }

    /* Footer */
    footer { background: #1e3d59; color: white; text-align: center; padding: 1.5rem 1rem; }
    footer a { color: #ffd700; text-decoration: none; }
  </style>
</head>
<body>

  <header>
    <h1>Your Rental Name</h1>
    <p>Cozy retreat in [Location]</p>
    <nav>
      <a href="#gallery">Gallery</a>
      <a href="#amenities">Amenities</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Welcome to Your Home Away from Home</h2>
  </section>

  <main>
    <!-- Gallery -->
    <section id="gallery">
      <h2>Photo Gallery</h2>
      <div class="gallery">
        <img src="images/photo1.jpg" alt="Living Room">
        <img src="images/photo2.jpg" alt="Bedroom">
        <img src="images/photo3.jpg" alt="Kitchen">
        <img src="images/photo4.jpg" alt="View">
      </div>
    </section>

    <!-- Amenities -->
    <section id="amenities">
      <h2>Amenities</h2>
      <div class="amenities">
        <div class="amenity">Wi-Fi</div>
        <div class="amenity">Pet Friendly</div>
        <div class="amenity">Kitchen</div>
        <div class="amenity">Parking</div>
        <div class="amenity">Hot Tub</div>
        <div class="amenity">Fireplace</div>
      </div>
    </section>

    <!-- Contact Form -->
    <section id="contact">
      <h2>Contact / Booking Inquiry</h2>
      <form action="mailto:your-email@example.com" method="POST" enctype="text/plain">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" rows="5" placeholder="Message / Dates you're interested in" required></textarea>
        <button type="submit">Send Inquiry</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Your Rental Name | <a href="#">Privacy Policy</a></p>
  </footer>

</body>
</html>
