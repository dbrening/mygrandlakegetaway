<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Grand Lake Getaway</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>My Grand Lake Getaway</h1>
  <p>Relax. Recharge. Explore the Rockies.</p>
</header>

<section class="hero">
  <img src="images/cabin.jpg" alt="Cabin in the mountains">
</section>

<section class="about">
  <h2>About the Cabin</h2>
  <p>
    Nestled near Grand Lake and just minutes from Rocky Mountain National Park,
    this cozy mountain retreat is perfect for relaxing, hiking, and making memories.
  </p>
</section>

<section class="gallery">
  <h2>Gallery</h2>
  <img src="images/photo1.jpg">
  <img src="images/photo2.jpg">
  <img src="images/photo3.jpg">
</section>

<section class="calendar">
  <h2>Availability</h2>
  <iframe src="https://calendar.google.com/calendar/embed?src=yourcalendarlink"
    style="border: 0" width="100%" height="600"></iframe>
</section>

<section class="contact">
  <h2>Contact</h2>
  <form name="contact" method="POST" data-netlify="true">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<footer>
  <p>© 2026 My Grand Lake Getaway</p>
</footer>

</body>
</html>
